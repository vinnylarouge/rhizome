# release.yml — push a tag (vX.Y.Z) and this builds Rhizome for macOS and Linux,
# runs the test suite on both platforms, and attaches the installers to the
# GitHub release. The README install button always points at the newest release.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac dmg
          - os: ubuntu-latest
            args: --linux
          - os: windows-latest
            args: --win nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx electron-builder ${{ matrix.args }} --publish never
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
          fail_on_unmatched_files: false
