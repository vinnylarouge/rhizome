<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loom — live discussion</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/style.css" />
  <script src="/vendor/d3.v7.min.js"></script>
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <span class="mark">✦</span>
      <span class="title" id="sessionTitle" contenteditable="true" spellcheck="false">Live Discussion</span>
    </div>
    <div class="controls">
      <button id="libraryBtn" class="pill" title="Session library (/sessions)">⛁ Sessions</button>
      <span id="autoBadge" class="auto-badge" hidden>⟳ AUTO</span>
      <span id="statusPill" class="status-pill" hidden></span>
      <span id="counts" class="counts"></span>
      <button id="pauseBtn" class="pill" title="Pause/resume all AI calls">⏸ Pause AI</button>
      <span id="conn" class="conn" title="connection">●</span>
    </div>
  </header>

  <main id="stage">
    <aside id="leftRail" class="rail">
      <div class="rail-head">Live feed</div>
      <div id="feedList" class="rail-body"></div>
    </aside>

    <section id="graphWrap">
      <svg id="graph"></svg>
      <div id="tooltip" class="tooltip" hidden></div>
      <div id="legend" class="legend"></div>
    </section>
  </main>

  <footer id="scratch">
    <div class="cmd-hint">
      commands · <b>/auto</b> auto-pilot · <b>/organise</b> group · <b>/abduct</b> infer · <b>/abstract</b> frames ·
      <b>/chunk</b> split · <b>/merge</b> tidy · <b>/saymore</b> elaborate · <b>/sessions</b> · <b>/search</b> · <b>/obsidian</b> export · <b>/compile</b> report
    </div>
    <div class="scratch-row">
      <textarea id="noteInput" rows="1" placeholder="Jot a note — shorthand & typos are fine, AI tidies them…  ⏎ to commit · Shift+⏎ for newline"></textarea>
      <button id="commitBtn" class="commit">Commit ⏎</button>
    </div>
  </footer>

  <div id="searchOverlay" class="overlay" hidden>
    <div class="overlay-panel">
      <div class="overlay-head">
        <span class="overlay-title">⌕ Search all sessions</span>
        <button id="searchClose" class="pill">✕ Close</button>
      </div>
      <input id="searchInput" type="text" placeholder="Search notes and themes across every session…" />
      <div id="searchMode" class="search-mode"></div>
      <div id="searchResults" class="session-list"></div>
    </div>
  </div>

  <div id="libraryOverlay" class="overlay" hidden>
    <div class="overlay-panel">
      <div class="overlay-head">
        <span class="overlay-title">✳ Rhizome — sessions</span>
        <button id="libraryClose" class="pill" hidden>✕ Close</button>
      </div>
      <div class="library-cols">
        <div class="library-new">
          <div class="col-head">New session</div>
          <input id="newSessionTitle" type="text" placeholder="Session title…" />
          <div id="coreCards" class="core-cards"></div>
          <button id="newSessionStart" class="commit">Start session</button>
        </div>
        <div class="library-list">
          <div class="col-head">Previous sessions</div>
          <div id="sessionList" class="session-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/graph.js"></script>
  <script src="/library.js"></script>
  <script src="/search.js"></script>
  <script src="/app.js"></script>
</body>
</html>
